services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      - PORT=3000
      - NODE_ENV=production
      # CORS_ORIGIN must be set in the host environment before running docker-compose.
      # Example: export CORS_ORIGIN=http://kiosk.example.com && docker-compose up
      # See deploy/.env.example for all required variables.
      - CORS_ORIGIN=${CORS_ORIGIN:?CORS_ORIGIN must be set to the kiosk frontend origin}
    restart: unless-stopped

  kiosk-app:
    build:
      context: ../kiosk-app
      dockerfile: Dockerfile
    volumes:
      - kiosk_dist:/kiosk_dist
    restart: unless-stopped

  # admin-web 待 admin-web 工程实现后取消注释
  # admin-web:
  #   build:
  #     context: ../admin-web
  #     dockerfile: Dockerfile
  #   volumes:
  #     - admin_dist:/admin_dist
  #   restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - kiosk_dist:/usr/share/nginx/html:ro
      # - admin_dist:/usr/share/nginx/admin:ro  # 待 admin-web 就绪后启用
    depends_on:
      - backend
      - kiosk-app
    restart: unless-stopped

volumes:
  kiosk_dist:
  # admin_dist:
